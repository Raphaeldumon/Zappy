name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  MIRROR_URL: git@github.com:EpitechPGE2-2025/G-YEP-400-RUN-4-1-zappy-3.git

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y make cmake g++ clang-format

      - name: Build
        run: make re

      - name: C++ / Python format check
        run: ./tools/format_all.sh --check

      - name: Unit tests (CTest)
        run: ctest --test-dir build --output-on-failure --no-tests=ignore

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: ai_python/pyproject.toml

      - name: Install Python package (dev extras)
        run: pip install -e "ai_python[dev]"

      - name: Ruff lint
        run: ruff check ai_python sim_python

      - name: Pytest
        run: pytest ai_python/tests -q

      - name: Mypy (non-blocking until typed)
        run: mypy --strict ai_python/zappy_train
        continue-on-error: true

  push-to-mirror:
    runs-on: ubuntu-latest
    needs: [build-and-test]
    if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to mirror repo
        env:
          MIRROR_PAT: ${{ secrets.MIRROR_PAT }}
        run: |
          MIRROR_HTTPS="https://x-access-token:${MIRROR_PAT}@github.com/EpitechPGE2-2025/G-YEP-400-RUN-4-1-zappy-3.git"
          git remote add mirror "$MIRROR_HTTPS"
          git push mirror main --force
