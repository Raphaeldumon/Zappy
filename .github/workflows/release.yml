name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y make cmake g++

      - name: Build release binaries
        run: make BUILD_TYPE=Release re

      - name: Package
        run: |
          name="zappy-${GITHUB_REF_NAME}"
          mkdir -p "dist/${name}"
          for b in zappy_server zappy_gui zappy_ai; do
            [ -f "$b" ] && cp "$b" "dist/${name}/"
          done
          [ -d gui/assets ] && cp -r gui/assets "dist/${name}/assets"
          [ -d models/current ] && cp -r models/current "dist/${name}/models"
          cp Makefile README.md "dist/${name}/" 2>/dev/null || true
          tar czf "${name}.tar.gz" -C dist "${name}"

      - name: Generate changelog
        run: |
          prev="$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || true)"
          {
            echo "## ${GITHUB_REF_NAME}"
            echo
            if [ -n "$prev" ]; then
              git log --pretty='- %s (%h)' "${prev}..${GITHUB_REF_NAME}"
            else
              git log --pretty='- %s (%h)' "${GITHUB_REF_NAME}"
            fi
          } > CHANGELOG_RELEASE.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: zappy-${{ github.ref_name }}.tar.gz
          body_path: CHANGELOG_RELEASE.md
          draft: false
