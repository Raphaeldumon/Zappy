site_name: Zappy
site_description: G-YEP-400 Zappy — server (C++20) + AI (Python)
repo_url: https://github.com/EpitechPGE2-2025/G-YEP-400-RUN-4-1-zappy-3
edit_uri: ""

docs_dir: docs

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      toggle: { icon: material/weather-night, name: Dark mode }
    - scheme: slate
      primary: indigo
      toggle: { icon: material/weather-sunny, name: Light mode }
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest

plugins:
  - search
  - mermaid2
  - git-revision-date-localized:
      enable_creation_date: true
      fallback_to_build_date: true

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid

nav:
  - Home: 01_architecture/01_overview.md
  - Architecture:
      - Server: 01_architecture/02_server.md
      - GUI (raylib): 01_architecture/03_gui_raylib.md
      - GUI (Vulkan): 01_architecture/03_gui_vulkan.md
      - Simulator: 01_architecture/05_simulator.md
      - Protocols: 01_architecture/06_protocols.md
      - Monorepo structure: 01_architecture/07_monorepo_structure.md
      - UML overview: 01_architecture/08_uml_overview.md
  - GUI protocol (PDF): G-YEP-400_zappy_GUI_protocol.pdf
